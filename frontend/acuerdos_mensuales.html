<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acuerdos Mensuales - Cumplir S.A.S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        body { background-color: #f4f6f9; }
        .card-header { background-color: #2c3e50; color: white; }
        .table-responsive { max-height: 70vh; overflow-y: auto; }
        .sticky-header th { position: sticky; top: 0; background-color: #343a40; color: white; z-index: 10; }
    </style>
</head>
<body>
    <div class="container-fluid mt-3">
        <div class="card shadow">
            <div class="card-header">
                <h4><i class="fas fa-chart-line"></i> Reporte de Acuerdos Mensuales</h4>
            </div>
            <div class="card-body">
                <!-- Filtros -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <label class="form-label">Mes</label>
                        <input type="month" id="fecha_mes" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">N° Operación</label>
                        <input type="text" id="operacion" class="form-control" placeholder="Ej: 386631-1061687169">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Cédula</label>
                        <input type="text" id="cedula" class="form-control" placeholder="Número de documento">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="cargarAcuerdos()">
                            <i class="fas fa-search"></i> Buscar
                        </button>
                    </div>
                </div>

                <!-- Tabla de resultados -->
                <div class="table-responsive">
                    <table class="table table-hover table-sm">
                        <thead class="sticky-header">
                            <tr>
                                <th>N° Operación</th>
                                <th>Cliente (Cédula)</th>
                                <th>Nombre</th>
                                <th>Fecha Acuerdo</th>
                                <th>Valor Acordado</th>
                                <th>Cuotas</th>
                                <th>Asesor</th>
                            </tr>
                        </thead>
                        <tbody id="tabla_acuerdos">
                            <tr><td colspan="7" class="text-center">Cargando datos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="mt-3 text-center">
            <a href="index.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Volver al Inicio</a>
        </div>
    </div>

<script>

const token = localStorage.getItem('access_token');
if (!token) {
    window.location.href = '/login.html';
}

        // Función para cargar acuerdos según filtros
        async function cargarAcuerdos() {
            const mes = document.getElementById('fecha_mes').value;
            const operacion = document.getElementById('operacion').value.trim();
            const cedula = document.getElementById('cedula').value.trim();

            // Construir URL con parámetros
            let url = '/acuerdos_mensuales?';
            if (mes) url += `mes=${mes}&`;
            if (operacion) url += `operacion=${encodeURIComponent(operacion)}&`;
            if (cedula) url += `cedula=${encodeURIComponent(cedula)}&`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const tbody = document.getElementById('tabla_acuerdos');
                if (data.status === 'success' && data.acuerdos.length > 0) {
                    let html = '';
                    data.acuerdos.forEach(a => {
                        const fecha = new Date(a.fecha_acuerdo).toLocaleDateString('es-CO');
                        html += `
                            <tr>
                                <td>${a.numero_obligacion || '—'}</td>
                                <td>${a.cedula}</td>
                                <td>${a.nombre}</td>
                                <td>${fecha}</td>
                                <td class="text-end">${formatMoney(a.monto_acordado)}</td>
                                <td class="text-center">${a.numero_cuotas}</td>
                                <td>${a.asesor_nombre || a.asesor_id || '—'}</td>
                            </tr>
                        `;
                    });
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center">No se encontraron acuerdos.</td></tr>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tabla_acuerdos').innerHTML = '<tr><td colspan="7" class="text-center text-danger">Error de conexión</td></tr>';
            }
        }

        // Formatear moneda
        function formatMoney(amount) {
            if (amount === undefined || amount === null) return '0';
            return amount.toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        // Cargar por defecto el mes actual
        document.addEventListener('DOMContentLoaded', () => {
            const hoy = new Date();
            const mesActual = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}`;
            document.getElementById('fecha_mes').value = mesActual;
            cargarAcuerdos();
        });
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
