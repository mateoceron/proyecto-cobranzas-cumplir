<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas - Cumplir S.A.S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        body { background-color: #f4f6f9; }
        .card-header { background-color: #dc3545; color: white; }
        .table-responsive { max-height: 70vh; overflow-y: auto; }
        .sticky-header th { position: sticky; top: 0; background-color: #343a40; color: white; z-index: 10; }
    </style>
</head>
<body>
    <div class="container-fluid mt-3">
        <div class="card shadow">
            <div class="card-header">
                <h4><i class="fas fa-bell"></i> Alertas Programadas</h4>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label>Filtrar por asesor</label>
                        <select id="filtro_asesor" class="form-select">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>Fecha desde</label>
                        <input type="date" id="fecha_desde" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Fecha hasta</label>
                        <input type="date" id="fecha_hasta" class="form-control">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="cargarAlertas()">Filtrar</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover table-sm">
                        <thead class="sticky-header">
                            <tr>
                                <th>#</th>
                                <th>OPERACIÓN</th>
                                <th>ASESOR</th>
                                <th>FECHA</th>
                                <th>HORA</th>
                                <th>ALERTA</th>
                            </tr>
                        </thead>
                        <tbody id="tabla_alertas">
                            <tr><td colspan="6" class="text-center">Cargando...</td><tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="mt-3 text-center">
            <a href="index.html" class="btn btn-secondary">Volver al Inicio</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/login.html';

        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('access_token');
            options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
            const response = await fetch(url, options);
            if (response.status === 401) {
                localStorage.removeItem('access_token');
                localStorage.removeItem('user');
                window.location.href = '/login.html';
            }
            return response;
        }

        async function cargarAsesores() {
            try {
                const resp = await fetchWithAuth('/asesores');
                const data = await resp.json();
                if (data.status === 'success') {
                    const select = document.getElementById('filtro_asesor');
                    data.asesores.forEach(asesor => {
                        const option = document.createElement('option');
                        option.value = asesor.asesor_id;
                        option.textContent = asesor.nombre_completo;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error cargando asesores:', error);
            }
        }

        async function cargarAlertas() {
            const asesor_id = document.getElementById('filtro_asesor').value;
            const fecha_desde = document.getElementById('fecha_desde').value;
            const fecha_hasta = document.getElementById('fecha_hasta').value;
            let url = '/alertas?';
            if (asesor_id) url += `asesor_id=${asesor_id}&`;
            if (fecha_desde) url += `fecha_desde=${fecha_desde}&`;
            if (fecha_hasta) url += `fecha_hasta=${fecha_hasta}&`;
            try {
                const resp = await fetchWithAuth(url);
                const data = await resp.json();
                const tbody = document.getElementById('tabla_alertas');
                if (data.status === 'success' && data.alertas.length > 0) {
                    let html = '';
                    data.alertas.forEach((a, idx) => {
                        html += `
                            <tr>
                                <td>${idx+1}</td>
                                <td>${a.operacion}</td>
                                <td>${a.asesor_nombre}</td>
                                <td>${new Date(a.fecha_alerta).toLocaleDateString('es-CO')}</td>
                                <td>${a.hora_alerta.substring(0,5)}</td>
                                <td>${a.mensaje || ''}</td>
                            </tr>
                        `;
                    });
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No hay alertas registradas</td><tr>';
                }
            } catch (error) {
                console.error('Error cargando alertas:', error);
                document.getElementById('tabla_alertas').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error de conexión</td><tr>';
            }
        }

        cargarAsesores().then(() => cargarAlertas());
    </script>
</body>
</html>
