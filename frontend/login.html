<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cumplir S.A.S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        /* Ajustes específicos para login (ya cubiertos por estilos.css) */
        body {
            background: none;
        }
        .login-container {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="card-header">
                <i class="fas fa-chart-line fa-3x" style="color: #1e3799;"></i>
                <h4 class="mt-3">CUMPLIR S.A.S</h4>
                <p class="text-muted">Sistema de Gestión de Cobranzas</p>
            </div>
            <div class="card-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control border-start-0" id="username" required placeholder="Ingrese su usuario">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control border-start-0" id="password" required placeholder="••••••">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-2">Ingresar <i class="fas fa-arrow-right ms-2"></i></button>
                </form>
                <div id="errorMsg" class="alert alert-danger mt-3" style="display: none;"></div>
            </div>
            <div class="card-footer text-center bg-transparent border-0">
                <small class="text-muted">© 2026 Cumplir S.A.S - Todos los derechos reservados</small>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            try {
                const response = await fetch('/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/index.html';
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = data.detail || 'Error de autenticación';
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Error de conexión';
            }
        });
    </script>
</body>
</html>
